version: '3.9'
services:
  control-plane:
    build: ./control-plane
    ports:
      - '8080:8080'
    environment:
      - NODE_ENV=production

  web:
    build: ./web
    ports:
      - '5173:80'
    depends_on:
      - control-plane

  agent:
    build: ./agent
    environment:
      - CONTROL_PLANE_URL=http://control-plane:8080
    depends_on:
      - control-plane
